<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <header>
        <h1>🙂タスク一覧🙂</h1>
    </header>    
    <main>
        <div class="task">
            <form method="post">
                <p th:text="${priority}"></p>
                <h4 th:text="${title}"></h4>
                <p th:text="${startDate}">から</p><p th:text="${duetDate}">まで</p><br>
                <p th:text="${detail}"></p>
            </form>
        </div>    
        <h3><a href="/create">新しいタスクをつくる</a></h3>
    </main>
</body>
</html>
